name: 🚀 Deploy Portfolio to OVH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to OVH via FTP
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚚 Deploy via FTP to OVH
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.PORTFOLIO_SSH_HOST }}
          username: ${{ secrets.PORTFOLIO_SSH_USER }}
          password: ${{ secrets.PORTFOLIO_SSH_PASSWORD }}
          server-dir: /www/portfolio/
          local-dir: ./
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .DS_Store

      - name: ✅ Notify success
        if: success()
        run: echo "✅ Portfolio deployed successfully to OVH!"

      - name: ❌ Notify failure
        if: failure()
        run: echo "❌ Deployment failed!"

